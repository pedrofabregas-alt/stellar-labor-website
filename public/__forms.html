<!DOCTYPE html>
<html>
<head><title>Forms</title></head>
<body>
  <!-- Netlify Forms detection file. These hidden forms allow Netlify's build scanner to detect form definitions from a Next.js App Router project. -->
  <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <input name="company" />
    <input name="subject" />
    <textarea name="message"></textarea>
  </form>
  <form name="employer-inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="companyName" />
    <input name="contactName" />
    <input name="email" />
    <input name="phone" />
    <input name="industry" />
    <input name="workersNeeded" />
    <input name="timeline" />
    <textarea name="description"></textarea>
  </form>
  <form name="talent-application" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="fullName" />
    <input name="email" />
    <input name="phone" />
    <input name="tradeArea" />
    <input name="experience" />
    <input name="certifications" />
    <input name="availability" />
  </form>
</body>
</html>
